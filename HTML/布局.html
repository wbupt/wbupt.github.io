<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>北邮布局</title>
    <style>
        /*var height0 = 1125;*/
        .box {
            /*var height0 = 125;*/

            line-height: 154px; /* 字体距离 */
            width: 1232px;
            width: 1125px;
            height: 100px;
            text-align: center;
            justify-content: center;
            align-items: center;
            background-color: pink; /* 背景 */
            margin: 0 auto;
        }

        .left {
            float: left;
            width: 220px;
            height: height*1px;
            background-color: rgb(88, 151, 16);
        }

        .right {
            float: left;
            width: 992px;
            height: 615px;
            background-color: skyblue; /* background */

        }

        .right>div {
            float: left;
            width: 234px;
            height: 300px;
            background-color: pink;
            margin-left: 14px;
            margin-bottom: 14px;
        }
    </style>
</head>

<body>
    <div class="box">
        <!-- <div class="left">左青龙</div> -->
        <div class="right">
            <div>
                <a href="#" title="不错">操场</a>
            </div>
            <div>
                <a href="#" title="好吃">食堂</a>
            </div>
            <div>
                <a href="#" title="开放时间: 14:00 - 16:00">篮球场</a>
                <a href="http://www.baidu.com">百度一下</a>
            </div>
            <div>4</div>
        </div>
    </div>·

</body>

</html>
